<div class="page-layout">
  <app-sidebar />
  <div class="main-content" style="padding:1.5rem;">

    <div class="topbar">
      <div>
        <h1 class="page-title">Siparişler</h1>
        <p class="page-sub">{{ totalElements }} sipariş</p>
      </div>
    </div>

    <div class="card" style="margin-bottom:1rem; display:flex; gap:12px;">
      <select [(ngModel)]="selectedStatus" (change)="onStatusFilter()"
        style="background:#12121a; border:0.5px solid #2e2e3e; border-radius:7px; padding:8px 12px; color:#9a9ab0; font-size:12px; cursor:pointer;">
        <option value="">Tüm Durumlar</option>
        <option value="PENDING">Beklemede</option>
        <option value="CONFIRMED">Onaylandı</option>
        <option value="SHIPPED">Kargoda</option>
        <option value="DELIVERED">Teslim Edildi</option>
        <option value="CANCELLED">İptal</option>
        <option value="RETURNED">İade</option>
      </select>
    </div>

    <div class="card">
      <div *ngIf="loading" style="text-align:center; color:#6c63ff; padding:2rem;">Yükleniyor…</div>
      <table class="data-table" *ngIf="!loading">
        <thead>
          <tr>
            <th>Sipariş No</th>
            <th>Müşteri</th>
            <th>Tutar</th>
            <th>Tarih</th>
            <th>Durum</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let o of orders" style="cursor:pointer;" routerLink="/corporate/orders/{{ o.id }}">
            <td style="color:#6c63ff; font-weight:500;">#{{ o.id }}</td>
            <td>
              <div style="color:#f0f0f5;">{{ o.customerName }}</div>
              <div style="font-size:10px; color:#4a4a6a;">{{ o.customerEmail }}</div>
            </td>
            <td style="color:#1d9e75;">{{ formatCurrency(o.totalAmount) }}</td>
            <td style="color:#7a7a9a; font-size:11px;">{{ o.createdAt | slice:0:10 }}</td>
            <td><span class="status-pill" [class]="getStatusClass(o.status)">{{ getStatusLabel(o.status) }}</span></td>
          </tr>
        </tbody>
      </table>

      <div style="display:flex; justify-content:space-between; align-items:center; margin-top:1rem; font-size:12px; color:#7a7a9a;" *ngIf="totalPages > 1">
        <span>Sayfa {{ page + 1 }} / {{ totalPages }}</span>
        <div style="display:flex; gap:8px;">
          <button class="btn-outline" [disabled]="page === 0" (click)="prevPage()">← Önceki</button>
          <button class="btn-outline" [disabled]="page >= totalPages - 1" (click)="nextPage()">Sonraki →</button>
        </div>
      </div>
    </div>

  </div>
</div>
