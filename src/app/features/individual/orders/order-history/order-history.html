<div class="page-layout">
  <app-sidebar />
  <div class="main-content" style="padding:1.5rem;">
    <div class="topbar">
      <div>
        <h1 class="page-title">Siparişlerim</h1>
        <p class="page-sub">Sipariş geçmişiniz</p>
      </div>
    </div>

    <div *ngIf="loading" style="text-align:center; color:#6c63ff; padding:3rem;">Yükleniyor…</div>

    <div class="card" *ngIf="!loading">
      <table class="data-table">
        <thead><tr><th>Sipariş No</th><th>Mağaza</th><th>Tutar</th><th>Tarih</th><th>Durum</th><th></th></tr></thead>
        <tbody>
          <tr *ngFor="let o of orders">
            <td style="color:#6c63ff; font-weight:500;">#{{ o.id }}</td>
            <td style="color:#f0f0f5;">{{ o.storeName || '-' }}</td>
            <td>{{ formatCurrency(o.totalAmount) }}</td>
            <td style="color:#7a7a9a; font-size:11px;">{{ o.createdAt | slice:0:10 }}</td>
            <td><span class="status-pill" [class]="getStatusClass(o.status)">{{ getStatusLabel(o.status) }}</span></td>
            <td><button class="btn-outline" style="font-size:11px;" routerLink="/individual/orders/{{ o.id }}">Detay</button></td>
          </tr>
        </tbody>
      </table>
      <div style="text-align:center; color:#4a4a6a; font-size:13px; padding:2rem;" *ngIf="!orders.length">Henüz sipariş yok.</div>
      <div style="display:flex; justify-content:space-between; margin-top:1rem; font-size:12px; color:#7a7a9a;" *ngIf="totalPages > 1">
        <button class="btn-outline" [disabled]="page === 0" (click)="prevPage()">← Önceki</button>
        <span>{{ page + 1 }} / {{ totalPages }}</span>
        <button class="btn-outline" [disabled]="page >= totalPages - 1" (click)="nextPage()">Sonraki →</button>
      </div>
    </div>

  </div>
</div>
